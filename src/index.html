<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>3D Printer Slicer Visualizer</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      #ui-controls {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 100;
        background: rgba(30, 30, 30, 0.85);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #444;
        color: #fff;
        display: flex;
        flex-direction: column;
        gap: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      button {
        background-color: #2e8b57;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #3cb371;
      }
      input[type="file"] {
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <div id="ui-controls">
      <h3 style="margin: 0 0 5px 0; font-size: 14px;">Controls</h3>
      <input type="file" id="fileInput" accept=".stl,.3mf" multiple>
      <button id="layflat">Lay Flat</button>
      <button id="rotationButton">Rotate</button>
      <button id="Autoplace">Auto Orientation</button>
      <button id="Autoarrange">Auto Arrange</button>
      <hr style="border: 0; border-top: 1px solid #444; width: 100%; margin: 5px 0;">
      <label style="font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
        <input type="checkbox" id="toggleConvex"> Show Convex Hull
      </label>
      <label style="font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
        <input type="checkbox" id="toggleFootprint" checked> Show 2D Footprint
      </label>
    </div>

    <div id="loading-overlay" style="
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(15, 15, 15, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #fff;
    ">
      <div style="
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top: 4px solid #2e8b57;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: loading-spin 1s linear infinite;
        margin-bottom: 15px;
      "></div>
      <div id="loading-text" style="font-size: 16px; font-weight: 600; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Processing Geometry...</div>
    </div>

    <style>
      @keyframes loading-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>

    <div id="canvas-container"></div>
    <div id="sceneContainer"></div>
    
    <script type="module" src="main.js"></script>
  </body>
</html>
